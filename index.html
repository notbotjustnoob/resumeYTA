<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yassir Taher</title>

  <script>
    (function(){
      var s = localStorage.getItem('cv-theme');
      var p = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', s || p);
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">

<style>
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   VARIABLES
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
:root {
  --bg:        #0b0a08;
  --surface:   #151310;
  --surface2:  #1c1a15;
  --border:    #2e2b22;
  --gold:      #C89B3C;
  --gold-d:    #9a7530;
  --gold-glow: rgba(200,155,60,.06);
  --cream:     #EAE5D9;
  --muted:     #8a8880;
  --text:      #C4C0B8;
}
:root[data-theme="light"] {
  --bg:        #F2EDE3;
  --surface:   #E9E4D8;
  --surface2:  #DDD8CB;
  --border:    #CCC5B5;
  --gold:      #8A6018;
  --gold-d:    #A87B2A;
  --gold-glow: rgba(138,96,24,.07);
  --cream:     #19160F;
  --muted:     #8A8278;
  --text:      #4A4840;
}

/* transition only during theme switch */
html.fx, html.fx * {
  transition: background-color .36s ease, border-color .36s ease,
              color .36s ease, box-shadow .36s ease !important;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   RESET
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-weight: 300;
  line-height: 1.65;
  overflow-x: hidden;
  cursor: none;
}
::-webkit-scrollbar       { width:2px; }
::-webkit-scrollbar-track { background:var(--bg); }
::-webkit-scrollbar-thumb { background:var(--gold-d); border-radius:2px; }

/* grain */
body::after {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:9000;
  opacity:.016;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:128px;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   CUSTOM CURSOR
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.cur { position:fixed; width:7px; height:7px; background:var(--gold); border-radius:50%; pointer-events:none; z-index:9999; transform:translate(-50%,-50%); }
.cur-r { position:fixed; width:28px; height:28px; border:1px solid var(--gold-d); border-radius:50%; pointer-events:none; z-index:9998; transform:translate(-50%,-50%); transition:width .25s,height .25s,border-color .25s; }
@media(hover:none){.cur,.cur-r{display:none} body{cursor:auto}}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   ████  HEADER BAR  ████
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.site-hdr {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 600;
  height: 62px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  box-shadow: 0 1px 32px rgba(0,0,0,.35);
}
.hdr-inner {
  height: 100%;
  padding: 0 3vw;
  display: grid;
  grid-template-columns: auto 1fr auto;
  align-items: center;
  gap: 24px;
}

/* Logo / name */
.hdr-logo {
  display: flex; align-items: center; gap: 10px;
  background: none; border: none; cursor: none; padding: 0;
}
.hdr-mono {
  font-family: 'DM Mono', monospace;
  font-size: 12px; letter-spacing: .22em;
  color: var(--gold);
}
.hdr-divider { width:1px; height:16px; background:var(--border); }
.hdr-name {
  font-family: 'Cormorant Garamond', serif;
  font-size: 19px; font-style: italic; font-weight: 300;
  color: var(--muted);
  transition: color .25s;
}
.hdr-logo:hover .hdr-name { color: var(--cream); }

/* Center nav */
.hdr-nav {
  display: flex; align-items: center; justify-content: center;
  gap: 2px; flex-wrap: nowrap; overflow: hidden;
}
.hdr-nav a {
  font-family: 'DM Mono', monospace;
  font-size: 10px; letter-spacing: .16em; text-transform: uppercase;
  color: var(--muted);
  text-decoration: none;
  padding: 6px 12px;
  border: 1px solid transparent;
  white-space: nowrap;
  transition: color .25s, border-color .25s, background .25s;
  cursor: none;
}
.hdr-nav a:hover { color: var(--gold); border-color: var(--border); }
.hdr-nav a.active { color: var(--gold); border-color: var(--gold-d); background: var(--gold-glow); }
@media(max-width:900px){ .hdr-nav { display:none; } }

/* Theme pill */
.theme-pill {
  display: flex; align-items: center; gap: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 7px 14px 7px 10px;
  cursor: none;
  transition: border-color .25s, background .25s;
  white-space: nowrap;
}
.theme-pill:hover { border-color: var(--gold-d); background: var(--gold-glow); }
.theme-pill svg {
  flex-shrink: 0;
  transition: opacity .3s, transform .3s;
}
.t-sun  { opacity:1; transform:scale(1); }
.t-moon { opacity:0; transform:scale(.5) rotate(-30deg); position:absolute; }
:root[data-theme="light"] .t-sun  { opacity:0; transform:scale(.5) rotate(30deg); }
:root[data-theme="light"] .t-moon { opacity:1; transform:scale(1) rotate(0deg); position:static; }
.t-icon-wrap {
  position:relative; width:14px; height:14px;
  display:flex; align-items:center; justify-content:center;
}
.theme-pill-label {
  font-family: 'DM Mono', monospace;
  font-size: 11px; letter-spacing: .15em; text-transform: uppercase;
  color: var(--muted);
  transition: color .25s;
}
.theme-pill:hover .theme-pill-label { color: var(--gold); }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   HERO — full width, 2-column
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.hero {
  min-height: 100vh;
  padding: 62px 6vw 0;           /* 62px = header height */
  display: grid;
  grid-template-columns: 1fr 1fr;
  align-items: center;
  position: relative;
  overflow: hidden;
}
@media(max-width:820px){ .hero { grid-template-columns:1fr; padding-bottom:80px; } }

.hero-left { padding: 80px 4vw 80px 0; }
.hero-label {
  font-family:'DM Mono',monospace;
  font-size:11px; letter-spacing:.3em; text-transform:uppercase;
  color:var(--gold); margin-bottom:32px;
  opacity:0; animation:fadeUp .7s ease .3s forwards;
}
.hero-name {
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(56px,8vw,130px);
  font-weight:300; line-height:.88; letter-spacing:-.02em;
  color:var(--cream);
  opacity:0; animation:fadeUp 1s ease .5s forwards;
}
.hero-name em { font-style:italic; color:var(--gold); display:block; }
.hero-title {
  margin-top:24px;
  font-size:13px; font-weight:400; letter-spacing:.18em; text-transform:uppercase;
  color:var(--muted);
  opacity:0; animation:fadeUp .7s ease .8s forwards;
}
.hero-rule {
  width:0; height:1px;
  background:linear-gradient(to right,var(--gold),transparent);
  margin:28px 0;
  opacity:0; animation:expandLine .9s ease 1s forwards;
}
.hero-contact {
  display:flex; gap:20px; flex-wrap:wrap;
  opacity:0; animation:fadeUp .7s ease 1.2s forwards;
}
.hero-contact a {
  font-family:'DM Mono',monospace; font-size:13px;
  color:var(--muted); text-decoration:none; letter-spacing:.05em;
  transition:color .25s; cursor:none;
}
.hero-contact a:hover { color:var(--gold); }

/* Hero right: decorative grid */
.hero-right {
  height:100%;
  display:flex; align-items:center; justify-content:flex-end;
  opacity:0; animation:fadeUp 1s ease .7s forwards;
  padding: 80px 0;
}
.hero-deco {
  width:100%; max-width:460px;
  border:1px solid var(--border);
  padding:40px;
  position:relative;
}
.hero-deco::before {
  content:'';
  position:absolute;
  top:-1px; left:20%; right:0; height:1px;
  background:var(--gold);
}
.deco-stat {
  display:grid; grid-template-columns:1fr 1fr;
  gap:1px; background:var(--border);
  border:1px solid var(--border);
  margin-bottom:28px;
}
.deco-cell {
  background:var(--bg);
  padding:20px 18px;
}
.deco-num {
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(28px,3.5vw,44px);
  font-weight:300; color:var(--cream);
  letter-spacing:-.02em; line-height:1;
}
.deco-num em { font-style:normal; font-size:.55em; color:var(--gold); margin-left:2px; }
.deco-lbl {
  font-family:'DM Mono',monospace;
  font-size:10px; letter-spacing:.18em; text-transform:uppercase;
  color:var(--muted); margin-top:8px;
}
.deco-tags { display:flex; flex-wrap:wrap; gap:6px; }
.deco-tag {
  font-family:'DM Mono',monospace;
  font-size:9px; letter-spacing:.1em; text-transform:uppercase;
  color:var(--gold-d); border:1px solid var(--border); padding:5px 10px;
}
@media(max-width:820px){ .hero-right { display:none; } }

/* scroll hint */
.hero-scroll {
  position:absolute; bottom:32px; left:6vw;
  display:flex; align-items:center; gap:10px;
  opacity:0; animation:fadeUp .6s ease 1.6s forwards;
}
.hero-scroll span {
  font-family:'DM Mono',monospace; font-size:10px;
  letter-spacing:.25em; text-transform:uppercase; color:var(--muted);
}
.scroll-bar {
  width:1px; height:36px;
  background:linear-gradient(to bottom,var(--muted),transparent);
  overflow:hidden; position:relative;
}
.scroll-bar::after {
  content:''; position:absolute; top:-100%; left:0;
  width:1px; height:100%; background:var(--gold);
  animation:scrollFlow 2s ease-in-out 1.8s infinite;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   MAIN — full width
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
main { padding: 0 6vw 120px; }

/* summary */
.summary-block { padding:72px 0 64px; border-bottom:1px solid var(--border); }
.summary-eyebrow {
  font-family:'DM Mono',monospace;
  font-size:11px; letter-spacing:.3em; text-transform:uppercase;
  color:var(--gold-d); margin-bottom:22px;
}
.summary-text {
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(20px,2.2vw,30px);
  font-weight:300; line-height:1.45; color:var(--cream);
  max-width:min(800px,90%);
}
.summary-text em { font-style:italic; color:var(--gold); }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   SECTIONS
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.cv-section { border-bottom:1px solid var(--border); padding:0; }

.sec-hdr {
  display:grid;
  grid-template-columns: auto 1fr auto auto;
  align-items:center;
  gap:20px;
  padding:44px 0;
  cursor:pointer; user-select:none;
}
.sec-hdr:hover .sec-title { color:var(--cream); }
.sec-num {
  font-family:'DM Mono',monospace;
  font-size:12px; letter-spacing:.15em; color:var(--gold-d);
}
.sec-title {
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(28px,4vw,52px);
  font-weight:300; letter-spacing:-.01em;
  color:#6e6b64;
  transition:color .3s;
}
.cv-section.open .sec-title { color:var(--cream); }
.sec-count {
  font-family:'DM Mono',monospace;
  font-size:11px; letter-spacing:.12em;
  color:var(--muted);
}
.sec-btn {
  width:30px; height:30px;
  border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  transition:border-color .3s, background .3s;
}
.sec-btn svg { transition:transform .4s ease; stroke:var(--gold-d); }
.cv-section.open .sec-btn { border-color:var(--gold-d); background:var(--gold-glow); }
.cv-section.open .sec-btn svg { transform:rotate(45deg); stroke:var(--gold); }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   CARDS WRAP + GRID
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.cards-wrap {
  max-height:0; overflow:hidden;
  transition:max-height .6s cubic-bezier(.4,0,.2,1);
}
.cards-grid {
  /* Full-width grid — fills available space */
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(min(100%, var(--card-min, 440px)), 1fr));
  border-top:1px solid var(--border);
  border-left:1px solid var(--border);
  margin-bottom:40px;
}

/* card */
.card {
  border-right:1px solid var(--border);
  border-bottom:1px solid var(--border);
  cursor:pointer;
  opacity:0; transform:translateY(12px);
  transition: opacity .4s ease, transform .4s ease,
              background .25s, border-color .25s;
}
.card.in { opacity:1; transform:translateY(0); }
.card:hover { background:rgba(255,255,255,.018); }
.card.open { background:var(--gold-glow); }

.card-head {
  padding:24px 26px;
  display:grid; grid-template-columns:1fr auto;
  gap:16px; align-items:start;
}
.card-role {
  font-size:15px; font-weight:500;
  color:var(--cream); margin-bottom:5px;
}
.card-org {
  font-family:'Cormorant Garamond',serif;
  font-size:22px; font-style:italic; font-weight:300;
  color:var(--gold);
}
.card-meta { text-align:right; display:flex; flex-direction:column; gap:4px; }
.card-date,.card-loc {
  font-family:'DM Mono',monospace;
  font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted);
}
.plus-ico { width:13px; height:13px; margin-top:6px; align-self:flex-end; }
.plus-ico line { stroke:var(--muted); transition:opacity .3s, stroke .3s; }
.card.open .plus-ico .vl { opacity:0; }
.card.open .plus-ico line { stroke:var(--gold); }

.card-body { max-height:0; overflow:hidden; transition:max-height .5s cubic-bezier(.4,0,.2,1); }
.card-inner {
  padding:4px 26px 24px;
  border-top:1px solid var(--border);
}
.card-summary {
  font-family:'Cormorant Garamond',serif;
  font-size:19px; font-style:italic;
  color:var(--muted); padding:14px 0 16px; line-height:1.5;
}
.card-bullets { list-style:none; display:flex; flex-direction:column; gap:9px; }
.card-bullets li {
  font-size:14px; color:var(--text); line-height:1.65;
  padding-left:18px; position:relative;
}
.card-bullets li::before { content:'–'; position:absolute; left:0; color:var(--gold-d); }

.impact-row {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:1px; background:var(--border);
  border:1px solid var(--border); margin-top:16px;
}
.impact-cell { background:var(--bg); padding:12px 14px; }
.impact-label {
  font-family:'DM Mono',monospace;
  font-size:9.5px; letter-spacing:.18em; text-transform:uppercase;
  color:var(--gold-d); margin-bottom:5px;
}
.impact-val { font-size:13px; color:var(--text); line-height:1.4; }

.card-tags { display:flex; flex-wrap:wrap; gap:6px; margin-top:16px; }
.tag {
  font-family:'DM Mono',monospace;
  font-size:9.5px; letter-spacing:.08em; text-transform:uppercase;
  color:var(--gold-d); border:1px solid var(--border); padding:4px 10px;
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   SKILLS SECTION
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.skills-body {
  padding-bottom:40px;
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(min(100%,320px), 1fr));
  gap:0;
  border-top:1px solid var(--border);
  border-left:1px solid var(--border);
}
.skill-group {
  border-right:1px solid var(--border);
  border-bottom:1px solid var(--border);
  padding:24px 26px;
  opacity:0; transform:translateY(10px);
  transition:opacity .4s, transform .4s;
}
.skill-group.in { opacity:1; transform:translateY(0); }
.skill-group-label {
  font-family:'DM Mono',monospace;
  font-size:10px; letter-spacing:.24em; text-transform:uppercase;
  color:var(--gold-d);
  margin-bottom:14px; padding-bottom:10px;
  border-bottom:1px solid var(--border);
}
.skills-flex { display:flex; flex-wrap:wrap; gap:7px; }
.skill-pill {
  font-size:13px; color:var(--text);
  border:1px solid var(--border); padding:5px 13px;
  transition:border-color .25s, color .25s, background .25s;
}
.skill-pill:hover { border-color:var(--gold-d); color:var(--cream); background:var(--gold-glow); }
.lang-group {
  border-right:1px solid var(--border);
  border-bottom:1px solid var(--border);
  padding:24px 26px;
  opacity:0; transform:translateY(10px);
  transition:opacity .4s, transform .4s;
}
.lang-group.in { opacity:1; transform:translateY(0); }
.lang-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:9px 0; border-bottom:1px solid var(--border);
}
.lang-row:last-child { border-bottom:none; }
.lang-name { font-size:14px; color:var(--cream); }
.lang-level { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.12em; color:var(--gold); }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   FOOTER
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
footer {
  border-top:1px solid var(--border);
  padding:32px 6vw;
  display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;
}
.footer-name { font-family:'Cormorant Garamond',serif; font-size:20px; font-style:italic; color:var(--muted); }
.footer-note { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.14em; color:var(--muted); }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   REVEAL
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.reveal { opacity:0; transform:translateY(24px); transition:opacity .7s ease, transform .7s ease; }
.reveal.in { opacity:1; transform:translateY(0); }

/* loading */
.loader {
  position:fixed; inset:0; background:var(--bg);
  display:flex; align-items:center; justify-content:center;
  z-index:8000; transition:opacity .5s;
}
.loader.done { opacity:0; pointer-events:none; }
.loader-dot { width:6px; height:6px; background:var(--gold-d); border-radius:50%; animation:pulse 1.2s infinite; }

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   KEYFRAMES
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
@keyframes fadeUp {
  from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)}
}
@keyframes expandLine {
  from{width:0;opacity:0} to{width:80px;opacity:1}
}
@keyframes scrollFlow {
  0%{top:-100%;opacity:1} 80%{opacity:1} 100%{top:110%;opacity:0}
}
@keyframes pulse {
  0%,100%{transform:scale(1);opacity:.4} 50%{transform:scale(1.7);opacity:1}
}

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   RESPONSIVE
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
@media(max-width:640px){
  main { padding:0 4vw 80px; }
  footer { padding:24px 4vw; }
  .hero { padding:62px 4vw 0; }
  .card-head { grid-template-columns:1fr; gap:6px; }
  .card-meta { text-align:left; }
  .hdr-inner { padding:0 1.2rem; }
}
</style>
</head>
<body>

<div class="loader" id="loader"><div class="loader-dot"></div></div>

<!-- cursors -->
<div class="cur"   id="cur"></div>
<div class="cur-r" id="curR"></div>

<!-- ████████ HEADER ████████ -->
<header class="site-hdr">
  <div class="hdr-inner">

    <button class="hdr-logo" id="hdrLogo" aria-label="Back to top">
      <span class="hdr-mono">YT</span>
      <div class="hdr-divider"></div>
      <span class="hdr-name" id="hdrName">Yassir Taher</span>
    </button>

    <nav class="hdr-nav" id="hdrNav" aria-label="Page sections">
      <!-- populated by JS -->
    </nav>

    <button class="theme-pill" id="themeBtn" aria-label="Toggle theme">
      <div class="t-icon-wrap">
        <!-- sun = shown in dark mode (click to go light) -->
        <svg class="t-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <circle cx="12" cy="12" r="4"/>
          <line x1="12" y1="2" x2="12" y2="5.5"/>
          <line x1="12" y1="18.5" x2="12" y2="22"/>
          <line x1="4.22" y1="4.22" x2="6.6" y2="6.6"/>
          <line x1="17.4" y1="17.4" x2="19.78" y2="19.78"/>
          <line x1="2" y1="12" x2="5.5" y2="12"/>
          <line x1="18.5" y1="12" x2="22" y2="12"/>
          <line x1="4.22" y1="19.78" x2="6.6" y2="17.4"/>
          <line x1="17.4" y1="6.6" x2="19.78" y2="4.22"/>
        </svg>
        <!-- moon = shown in light mode (click to go dark) -->
        <svg class="t-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </div>
      <span class="theme-pill-label" id="tLabel">Light</span>
    </button>

  </div>
</header>

<!-- ████████ HERO ████████ -->
<section class="hero" id="hero">
  <div class="hero-left">
    <div class="hero-label"  id="heroLabel"></div>
    <h1  class="hero-name"   id="heroName"></h1>
    <p   class="hero-title"  id="heroTitle"></p>
    <div class="hero-rule"></div>
    <div class="hero-contact" id="heroContact"></div>
  </div>
  <div class="hero-right">
    <div class="hero-deco">
      <div class="deco-stat">
        <div class="deco-cell">
          <div class="deco-num">8<em>+</em></div>
          <div class="deco-lbl">Years Experience</div>
        </div>
        <div class="deco-cell">
          <div class="deco-num">10<em>+</em></div>
          <div class="deco-lbl">Major Projects</div>
        </div>
        <div class="deco-cell">
          <div class="deco-num">4</div>
          <div class="deco-lbl">Continents</div>
        </div>
        <div class="deco-cell">
          <div class="deco-num">8<em>+</em></div>
          <div class="deco-lbl">Oil Majors</div>
        </div>
      </div>
      <div class="deco-tags" id="decoTags"></div>
    </div>
  </div>
  <div class="hero-scroll" aria-hidden="true">
    <span>Scroll</span>
    <div class="scroll-bar"></div>
  </div>
</section>

<!-- ████████ MAIN ████████ -->
<main>
  <div class="summary-block reveal" id="summary">
    <div class="summary-eyebrow">Profile</div>
    <p class="summary-text" id="summaryText"></p>
  </div>
  <div id="sectionsRoot"></div>
</main>

<footer>
  <span class="footer-name" id="footerName"></span>
  <span class="footer-note" id="footerNote"></span>
</footer>

<!-- ████████ SCRIPT ████████ -->
<script>
(() => {
  'use strict';

  const $  = id => document.getElementById(id);
  const esc= s  => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const em = s  => esc(s).replace(/\[em\](.*?)\[\/em\]/g,'<em>$1</em>');

  /* ── Cursor ── */
  const cur = $('cur'), curR = $('curR');
  let mx=-100,my=-100,rx=-100,ry=-100;
  document.addEventListener('mousemove', e => {
    mx=e.clientX; my=e.clientY;
    cur.style.left=mx+'px'; cur.style.top=my+'px';
  });
  (function tick(){ rx+=(mx-rx)*.13; ry+=(my-ry)*.13; curR.style.left=rx+'px'; curR.style.top=ry+'px'; requestAnimationFrame(tick); })();
  const big = () => { curR.style.width='50px'; curR.style.height='50px'; curR.style.borderColor='var(--gold)'; };
  const nrm = () => { curR.style.width='28px'; curR.style.height='28px'; curR.style.borderColor='var(--gold-d)'; };

  /* ── Theme ── */
  const html = document.documentElement;
  function getTheme(){ return html.getAttribute('data-theme'); }
  function setTheme(t){
    html.classList.add('fx');
    html.setAttribute('data-theme', t);
    localStorage.setItem('cv-theme', t);
    updateThemeLabel();
    setTimeout(() => html.classList.remove('fx'), 400);
  }
  function updateThemeLabel(){
    const lbl = $('tLabel');
    if (lbl) lbl.textContent = getTheme()==='dark' ? 'Light' : 'Dark';
  }
  $('themeBtn').addEventListener('click', () => setTheme(getTheme()==='dark'?'light':'dark'));
  [$('themeBtn')].forEach(el => { el.addEventListener('mouseenter',big); el.addEventListener('mouseleave',nrm); });
  updateThemeLabel();

  /* ── Header logo scroll to top ── */
  $('hdrLogo').addEventListener('click', () => window.scrollTo({top:0,behavior:'smooth'}));
  $('hdrLogo').addEventListener('mouseenter',big); $('hdrLogo').addEventListener('mouseleave',nrm);

  /* ── Section expand/collapse ── */
  function openSec(sec){
    const wrap=sec.querySelector('.cards-wrap'), hdr=sec.querySelector('.sec-hdr');
    sec.classList.add('open');
    hdr.setAttribute('aria-expanded','true');
    const items = wrap.querySelectorAll('.card, .skill-group, .lang-group');
    items.forEach((c,i) => setTimeout(() => c.classList.add('in'), i*55));
    wrap.style.maxHeight = wrap.scrollHeight+'px';
    setTimeout(() => { if(sec.classList.contains('open')) wrap.style.maxHeight='none'; }, 680);
  }
  function closeSec(sec){
    const wrap=sec.querySelector('.cards-wrap'), hdr=sec.querySelector('.sec-hdr');
    sec.classList.remove('open');
    hdr.setAttribute('aria-expanded','false');
    wrap.style.maxHeight = wrap.scrollHeight+'px';
    requestAnimationFrame(() => requestAnimationFrame(() => { wrap.style.maxHeight='0'; }));
  }

  /* ── Card expand/collapse ── */
  function toggleCard(card){
    const body=card.querySelector('.card-body');
    if(!body) return;
    const was=card.classList.contains('open');
    card.classList.toggle('open');
    body.style.maxHeight = was ? '0' : body.scrollHeight+'px';
    if(!was) setTimeout(()=>{ if(card.classList.contains('open')) body.style.maxHeight='none'; },530);
  }

  /* ── Scroll reveal ── */
  const ro = new IntersectionObserver(es => es.forEach(e => { if(e.isIntersecting) e.target.classList.add('in'); }), {threshold:.06});

  /* ── Nav highlight + header nav active ── */
  let navLinks = [];
  const sno = new IntersectionObserver(es => {
    es.forEach(e => {
      if(!e.isIntersecting) return;
      navLinks.forEach(a => a.classList.toggle('active', a.dataset.target===e.target.id));
    });
  }, {threshold:.25});

  /* ══════════════════════════════════════════
     RENDER
  ══════════════════════════════════════════ */
  function renderCard(card){
    const hasBody = card.summary||card.bullets||card.impacts||card.tags;
    return `<div class="card" role="button" tabindex="0">
      <div class="card-head">
        <div>
          <div class="card-role">${esc(card.role)}</div>
          <div class="card-org">${esc(card.org)}</div>
        </div>
        <div class="card-meta">
          <div class="card-date">${esc(card.date)}</div>
          ${card.location?`<div class="card-loc">${esc(card.location)}</div>`:''}
          ${hasBody?`<svg class="plus-ico" viewBox="0 0 13 13" fill="none" stroke-width="1.1">
            <line x1="6.5" y1="0" x2="6.5" y2="13" class="vl"/>
            <line x1="0" y1="6.5" x2="13" y2="6.5"/>
          </svg>`:''}
        </div>
      </div>
      ${hasBody?`<div class="card-body"><div class="card-inner">
        ${card.summary?`<p class="card-summary">${em(card.summary)}</p>`:''}
        ${card.bullets?`<ul class="card-bullets">${card.bullets.map(b=>`<li>${em(b)}</li>`).join('')}</ul>`:''}
        ${card.impacts?`<div class="impact-row">${card.impacts.map(i=>`<div class="impact-cell"><div class="impact-label">${esc(i.label)}</div><div class="impact-val">${esc(i.value)}</div></div>`).join('')}</div>`:''}
        ${card.tags?`<div class="card-tags">${card.tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>`:''}
      </div></div>`:''}
    </div>`;
  }

  function renderSkillsSection(sec){
    const grpHTML = sec.groups.map(g=>`
      <div class="skill-group">
        <div class="skill-group-label">${esc(g.label)}</div>
        <div class="skills-flex">${g.pills.map(p=>`<span class="skill-pill">${esc(p)}</span>`).join('')}</div>
      </div>`).join('');
    const langHTML = sec.languages?`
      <div class="lang-group">
        <div class="skill-group-label">Languages</div>
        ${sec.languages.map(l=>`<div class="lang-row"><span class="lang-name">${esc(l.name)}</span><span class="lang-level">${esc(l.level)}</span></div>`).join('')}
      </div>`:'';
    return `<div class="cards-wrap"><div class="skills-body">${grpHTML}${langHTML}</div></div>`;
  }

  function renderSection(sec){
    const count = sec.cards ? sec.cards.length : (sec.groups ? sec.groups.length : 0);
    const innerHTML = sec.type==='skills'
      ? renderSkillsSection(sec)
      : `<div class="cards-wrap"><div class="cards-grid" style="--card-min:${sec.cardMin||'440px'}">${sec.cards.map(renderCard).join('')}</div></div>`;
    return `<section class="cv-section reveal" id="${esc(sec.id)}">
      <div class="sec-hdr" role="button" tabindex="0" aria-expanded="false">
        <span class="sec-num">${esc(sec.num)}</span>
        <h2 class="sec-title">${esc(sec.title)}</h2>
        <span class="sec-count">${count} item${count!==1?'s':''}</span>
        <div class="sec-btn" aria-hidden="true">
          <svg width="11" height="11" viewBox="0 0 11 11" fill="none" stroke-width="1.2">
            <line x1="5.5" y1="0" x2="5.5" y2="11"/>
            <line x1="0" y1="5.5" x2="11" y2="5.5"/>
          </svg>
        </div>
      </div>
      ${innerHTML}
    </section>`;
  }

  /* ══════════════════════════════════════════
     BOOT
  ══════════════════════════════════════════ */
  fetch('./cv-data.json')
    .then(r => { if(!r.ok) throw new Error('Cannot load cv-data.json'); return r.json(); })
    .then(data => {

      /* meta */
      document.title = data.meta.pageTitle;
      $('footerName').textContent = data.hero.firstName+' '+data.hero.lastName;
      $('footerNote').textContent  = data.meta.footerNote;

      /* hero */
      $('heroLabel').textContent   = data.hero.label;
      $('heroName').innerHTML      = `${esc(data.hero.firstName)}<em>${esc(data.hero.lastName)}</em>`;
      $('heroTitle').textContent   = data.hero.title;
      $('heroContact').innerHTML   = data.hero.contact.map(c =>
        `<a href="${esc(c.href)}"${c.external?' target="_blank" rel="noopener"':''}>${esc(c.label)}</a>`
      ).join('');

      /* hero deco tags — pull from first section's first card */
      const featTags = (data.sections[0]?.cards?.[0]?.tags||[]).slice(0,5);
      $('decoTags').innerHTML = featTags.map(t=>`<span class="deco-tag">${esc(t)}</span>`).join('');

      /* summary */
      $('summaryText').innerHTML = em(data.summary);

      /* sections */
      $('sectionsRoot').innerHTML = data.sections.map(renderSection).join('');

      /* header nav */
      const navItems = [
        {id:'summary',  label:'About'},
        ...data.sections.map(s => ({id:s.id, label:s.title}))
      ];
      const hdrNav = $('hdrNav');
      navItems.forEach(({id,label}) => {
        const a = document.createElement('a');
        a.href='#'+id; a.textContent=label; a.dataset.target=id;
        a.addEventListener('click', e => { e.preventDefault(); document.getElementById(id)?.scrollIntoView({behavior:'smooth'}); });
        a.addEventListener('mouseenter',big); a.addEventListener('mouseleave',nrm);
        hdrNav.appendChild(a);
        navLinks.push(a);
      });

      /* observe for reveal + nav */
      document.querySelectorAll('.reveal').forEach(el => ro.observe(el));
      [{id:'hero',label:'Hero'}, {id:'summary',label:'About'}, ...data.sections.map(s=>({id:s.id}))].forEach(({id}) => {
        const el = document.getElementById(id);
        if(el) sno.observe(el);
      });

      /* section headers */
      document.querySelectorAll('.sec-hdr').forEach(hdr => {
        const go = () => { const s=hdr.closest('.cv-section'); s.classList.contains('open')?closeSec(s):openSec(s); };
        hdr.addEventListener('click', go);
        hdr.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' '){e.preventDefault();go();} });
        hdr.addEventListener('mouseenter',big); hdr.addEventListener('mouseleave',nrm);
      });

      /* cards */
      document.querySelectorAll('.card').forEach(card => {
        if(!card.querySelector('.card-body')) return;
        const go = () => toggleCard(card);
        card.addEventListener('click', go);
        card.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' '){e.preventDefault();go();} });
        card.addEventListener('mouseenter',big); card.addEventListener('mouseleave',nrm);
      });

      /* links + pill */
      document.querySelectorAll('a').forEach(el => { el.addEventListener('mouseenter',big); el.addEventListener('mouseleave',nrm); });

      /* hide loader */
      const ldr = $('loader'); ldr.classList.add('done'); setTimeout(()=>ldr.remove(),600);
    })
    .catch(err => {
      $('loader').innerHTML = `<p style="font-family:monospace;color:#C89B3C;font-size:12px;text-align:center;padding:20px">
        Could not load cv-data.json<br><small style="color:#54524b;display:block;margin-top:8px">Ensure both files are in the same folder and served over HTTP</small></p>`;
    });

})();
</script>
</body>
</html>
